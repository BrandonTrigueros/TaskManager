services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: taskmanager_pg_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: heartbeat
      POSTGRES_USER: hb_admin
      POSTGRES_PASSWORD: dev_password_local
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hb_admin -d heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:
